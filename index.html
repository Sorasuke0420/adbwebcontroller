<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYF36 Mac/Android Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; color: #333; }
        h2 { margin-bottom: 20px; font-size: 22px; }
        button { margin: 10px; padding: 15px 25px; font-size: 16px; border-radius: 8px; border: none; background: #007aff; color: white; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:active { background: #0056b3; }
        input { padding: 12px; font-size: 16px; width: 80%; max-width: 300px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        hr { border: 0; height: 1px; background: #ccc; margin: 25px 0; }
        .pad { display: grid; grid-template-columns: repeat(3, 1fr); width: 220px; margin: 20px auto; gap: 5px; }
        .pad button { margin: 0; padding: 20px 0; }
        #btnBack { background: #8e8e93; width: 220px; padding: 12px 0; }
        #btnBack:active { background: #636366; }
        .info { font-size: 12px; color: #666; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

    <h2>KYF36 コントローラー</h2>
    
    <!-- 1. 接続ボタン -->
    <button id="connectBtn" style="background: #34c759;">KYF36とUSB接続</button>

    <hr>

    <!-- 2. キーボード入力エリア -->
    <div>
        <input type="text" id="textInput" placeholder="ここに文字を入力 (Enterで送信)">
        <button id="sendTextBtn">送信</button>
    </div>

    <hr>

    <!-- 3. リモコン・十字キーエリア -->
    <div class="pad">
        <div></div><button id="btnUp">▲</button><div></div>
        <button id="btnLeft">◀</button><button id="btnCenter">決定</button><button id="btnRight">▶</button>
        <div></div><button id="btnDown">▼</button><div></div>
    </div>
    <button id="btnBack">戻る</button>

    <div class="info">
        【操作ヒント】<br>
        ・Mac操作時：文字入力欄以外の場所でキーボードを叩くと連動します<br>
        （矢印キー＝十字キー、Enter＝決定、Backspace＝戻る）
    </div>

    <!-- WebUSB経由で高精度にADB通信を行う近代的なライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/@yume-chan/adb@0.0.22/dist/browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@yume-chan/adb-backend-webusb@0.0.22/dist/browser.js"></script>
    
    <script>
        let adbDevice;
        let adbTransport;

        // USB接続処理
        document.getElementById('connectBtn').onclick = async () => {
            try {
                // ブラウザのUSBデバイス選択ポップアップを呼び出す
                const device = await navigator.usb.requestDevice({ filters: [] });
                if (!device) return;

                // WebUSBバックエンドを初期化
                const backend = new window['@yume-chan/adb-backend-webusb'].AdbWebUsbBackend(device);
                await backend.connect();

                // ADB通信を確立
                adbTransport = await window['@yume-chan/adb'].Adb.create(backend);
                alert("KYF36と接続成功！");
                document.getElementById('connectBtn').innerText = "接続済み";
                document.getElementById('connectBtn').style.background = "#8e8e93";
            } catch (e) {
                console.error(e);
                alert("接続エラー: " + e.message + "\n\n※Macの場合、ターミナルで「adb kill-server」を実行したか確認してください。");
            }
        };

        // コマンド送信共通関数
        async function sendCommand(cmd) {
            if (!adbTransport) return;
            try {
                // shellコマンドを実行して送信
                await adbTransport.subprocess.spawn(cmd);
            } catch (e) {
                console.error("コマンド送信失敗:", e);
            }
        }

        // 文字送信処理
        function handleSendText() {
            let input = document.getElementById('textInput');
            let text = input.value.replace(/ /g, '%s'); // スペースをエスケープ
            if(!text) return;
            sendCommand(`input text "${text}"`);
            input.value = '';
            input.focus();
        }

        document.getElementById('sendTextBtn').onclick = handleSendText;
        
        // 入力欄でEnterを押した時も送信
        document.getElementById('textInput').onkeydown = (e) => {
            if (e.key === 'Enter') {
                handleSendText();
                e.preventDefault();
            }
        };

        // 画面ボタンクリックのイベント割り当て
        document.getElementById('btnUp').onclick = () => sendCommand('input keyevent 19');
        document.getElementById('btnDown').onclick = () => sendCommand('input keyevent 20');
        document.getElementById('btnLeft').onclick = () => sendCommand('input keyevent 21');
        document.getElementById('btnRight').onclick = () => sendCommand('input keyevent 22');
        document.getElementById('btnCenter').onclick = () => sendCommand('input keyevent 23');
        document.getElementById('btnBack').onclick = () => sendCommand('input keyevent 4');

        // Mac物理キーボード連動イベント（入力欄にフォーカスがない時だけ動作）
        window.onkeydown = (e) => {
            if (document.activeElement === document.getElementById('textInput')) return;

            if (e.key === 'ArrowUp') { sendCommand('input keyevent 19'); e.preventDefault(); }
            if (e.key === 'ArrowDown') { sendCommand('input keyevent 20'); e.preventDefault(); }
            if (e.key === 'ArrowLeft') { sendCommand('input keyevent 21'); e.preventDefault(); }
            if (e.key === 'ArrowRight') { sendCommand('input keyevent 22'); e.preventDefault(); }
            if (e.key === 'Enter') { sendCommand('input keyevent 23'); e.preventDefault(); }
            if (e.key === 'Backspace') { sendCommand('input keyevent 4'); e.preventDefault(); }
        };
    </script>
</body>
</html>
